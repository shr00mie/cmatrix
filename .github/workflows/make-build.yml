# Clang + Make + Notcurses — matches Makefile defaults:
#   Linux: CC=clang, Ubuntu packages aligned with scripts/01_check_install_deps.sh
#   macOS: CC=xcrun clang (Makefile DEFAULT_CC), Homebrew pkgconf + notcurses + brew shellenv

name: Make build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

concurrency:
  group: make-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            clang \
            pkg-config \
            libnotcurses-dev
          clang --version
          pkg-config --print-errors --modversion notcurses
      - name: Build
        env:
          CC: clang
        run: |
          set -eux
          make distclean || true
          make
      - name: Version smoke
        run: ./cmatrix -V

  macos:
    strategy:
      fail-fast: false
      matrix:
        # Apple Silicon + Intel runners (toolchain via xcrun clang per Makefile)
        os: [macos-15, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          set -eux
          brew update
          brew install pkgconf notcurses
          eval "$(brew shellenv)"
          xcrun clang --version
          pkg-config --print-errors --modversion notcurses
      - name: Build
        run: |
          set -eux
          eval "$(brew shellenv)"
          make distclean || true
          make
      - name: Version smoke
        run: ./cmatrix -V
