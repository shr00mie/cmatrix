# Travis CI: Linux (Ubuntu) build smoke only.
#
# Cross-platform coverage (Ubuntu LTS + macOS, Clang + Make + Notcurses) is defined in
# .github/workflows/ubuntu-*.yml and macos-*.yml. Travis no longer offers macOS
# builders for new work; use GitHub Actions for macOS compatibility checks.
#
# Apt packages align with scripts/01_check_install_deps.sh (Ubuntu) and the Ubuntu GA workflows.
language: c
dist: jammy
compiler: clang

addons:
  apt:
    packages:
      - build-essential
      - clang
      - pkg-config
      - libnotcurses-dev

script:
  - clang --version
  - pkg-config --print-errors --modversion notcurses
  - make distclean || true
  - make CC=clang
  - ./cmatrix -V
